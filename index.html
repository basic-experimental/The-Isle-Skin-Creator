<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Isle Hordetest Skin Creator</title>
        <meta charset="utf8">
        <style>
            :root {
                color-scheme: light dark;
                --theme1: light-dark(#efefef, #404040);
                --theme2: light-dark(#404040, #808080);
            }

            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                margin-top: 0;
                margin-bottom: 0;
                align-items: center;
            }

            header h1 {
                margin-top: 0;
                font-family: "Consolas", monospace;
            }

            #skinCreator {
                flex: 1;
                font-family: "Consolas", monospace;
            }

            #skinCreatorContainer {
                border: solid 2px var(--theme1);
                border-radius: 10px;
                padding: 25px;
                margin-top: 10px;
            }

            .input-container {
                display: flex;
                align-items: center;
                width: 250px;
                height: 32px;
                margin: 5px;
            }

            .input-container select {
                flex-grow: 1;
                height: 100%;
            }

            .color-input-container label {
                display: inline-block;
                width: 150px;
            }

            .color-input-container input[type="color"] {
                flex-grow: 1;
                height: 100%;
            }

            input[type="color"], select, button {
                background-color: var(--theme1);
                border: solid 1px var(--theme2);
                border-radius: 5px;
                border-width: 1px;
            }

            #codeContainer {
                margin-top: 20px;
                height: 30px;
            }

            #output {
                border: solid 1px var(--theme2);
                display: inline-block;
                margin-top: 0;
                margin-right: 10px;
                box-sizing: border-box;
                height: 100%;
                vertical-align: top;
                padding: 0 10px;
                background-color: var(--theme1);
                border-radius: 2px;
                border-width: 1px;
                line-height: 28px;
                font-size: 10pt;
            }

            #copyButton {
                height: 100%;
                background-color: var(--theme1);
                border-radius: 2px;
                border-width: 1px;
                font-size: 10pt;
            }

            footer {
                margin-top: 50px;
                margin-bottom: 10px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="skinCreator">
            <div id="skinCreatorContainer">
                <header>
                    <h1>The Isle Hordetest Skin Creator</h1>
                </header>
                <div class="input-container" style="display: none;">
                    <input type="checkbox" id="onlyValid" checked>
                    <label for="onlyValid">Only allow skins that work when you spawn in</label>
                </div>
                <div class="input-container">
                    <label for="dino">Creature: </label>
                    <select name="dino" id="dino">
                        <option value="">--Select a Creature--</option>
                        <option value="Deinosuchus">Deinosuchus</option>
                        <option value="Tyrannosaurus">Tyrannosaurus</option>
                        <option value="Allosaurus">Allosaurus</option>
                        <option value="Carnotaurus">Carnotaurus</option>
                        <option value="Ceratosaurus">Ceratosaurus</option>
                        <option value="Dilophosaurus">Dilophosaurus</option>
                        <option value="Herrerasaurus">Herrerasaurus</option>
                        <option value="Omniraptor">Omniraptor</option>
                        <option value="Austroraptor">Austroraptor</option>
                        <option value="Troodon">Troodon</option>
                        <option value="Pteradon">Pteradon</option>
                        <option value="Triceratops">Triceratops</option>
                        <option value="Stegosaurus">Stegosaurus</option>
                        <option value="Maiasaura">Maiasaura</option>
                        <option value="Tenontosaurus">Tenontosaurus</option>
                        <option value="Kentrosaurus">Kentrosaurus</option>
                        <option value="Diabloceratops">Diabloceratops</option>
                        <option value="Pachycephalosaurus">Pachycephalosaurus</option>
                        <option value="Dryosaurus">Dryosaurus</option>
                        <option value="Hypsilophodon">Hypsilophodon</option>
                        <option value="Gallimimus">Gallimimus</option>
                        <option value="Beipiaosaurus">Beipiaosaurus</option>
                    </select>
                </div>
                <div id="patternContainer">
                    <div class="pattern-input-container input-container">
                        <label for="pattern">Pattern:&nbsp;</label>
                        <select id="pattern">
                            <option value="0">Pattern 1</option>
                            <option value="1">Pattern 2</option>
                            <option value="2">Pattern 3</option>
                        </select>
                    </div>
                    <div class="pattern-input-container input-container">
                        <label for="pattern">Pattern Variation:&nbsp;</label>
                        <select id="variation">
                            <option value="0">Small</option>
                            <option value="1">Medium</option>
                            <option value="2">Large</option>
                        </select>
                    </div>
                </div>
                <div class="color-input-container input-container">
                    <label for="maleDisplay">Male Display</label>
                    <input type="color" id="maleDisplay">
                </div>
                <div class="color-input-container input-container">
                    <label for="markings">Markings</label>
                    <input type="color" id="markings">
                </div>
                <div class="color-input-container input-container">
                    <label for="flank">Flank</label>
                    <input type="color" id="flank">
                </div>
                <div class="color-input-container input-container">
                    <label for="body">Body</label>
                    <input type="color" id="body">
                </div>
                <div class="color-input-container input-container">
                    <label for="underbelly">Underbelly</label>
                    <input type="color" id="underbelly">
                </div>
                <div id="codeContainer">
                    <output id="output"></output>
                    <button id="copyButton">Copy</button>
                </div>
            </div>
        </div>
        <footer>
            This site doesn't collect usage data.<br>
            &copy; 2026 Basic-Experimental. <a href="https://github.com/basic-experimental/The-Isle-Hordetest-Skin-Creator">Open Source</a> under the <a href="https://opensource.org/license/mit">MIT Licence.</a><br>
            <a href="https://www.survivetheisle.com">The Isle</a> is a trademark of Afterthought LLC. This site is not associated with the developers of the game.
        </footer>
        <script>
            const onlyValidInput = document.getElementById("onlyValid");
            const dinoInput = document.getElementById("dino");
            const patternInput = document.getElementById("pattern");
            const variationInput = document.getElementById("variation");
            const maleDisplayInput = document.getElementById("maleDisplay");
            const markingsInput = document.getElementById("markings");
            const flankInput = document.getElementById("flank");
            const bodyInput = document.getElementById("body");
            const underbellyInput = document.getElementById("underbelly");
            const output = document.getElementById("output");
            const copyButton = document.getElementById("copyButton");

            const colorInputs = [maleDisplayInput, markingsInput, flankInput, bodyInput, underbellyInput];

            let code;
            let copyTimeout;

            function correctColor(hexColor) {
                let r = parseInt(hexColor.slice(1, 3), 16);
                let g = parseInt(hexColor.slice(3, 5), 16);
                let b = parseInt(hexColor.slice(5, 7), 16);

                if (r < 0x1A) {
                    const bump = 0x1A - r;
                    r = Math.min(r + bump, 255);
                    g = Math.min(g + bump, 255);
                    b = Math.min(b + bump, 255);
                }

                return "#" + r.toString(16).padStart(2, '0') + 
                             g.toString(16).padStart(2, '0') + 
                             b.toString(16).padStart(2, '0');
            }

            function fixColorInputs() {
                if(onlyValidInput.checked) {
                    for(const colorInput of colorInputs) {
                        colorInput.value = correctColor(colorInput.value);
                    }
                }
            }

            function update() {
                fixColorInputs();

                const dino = dinoInput.value;
                const pattern = patternInput.value;
                const variation = variationInput.value;
                const maleDisplay = maleDisplayInput.value.slice(1).toUpperCase();
                const markings = markingsInput.value.slice(1).toUpperCase();
                const flank = flankInput.value.slice(1).toUpperCase();
                const body = bodyInput.value.slice(1).toUpperCase();
                const underbelly = underbellyInput.value.slice(1).toUpperCase();

                code = `${dino}${pattern}${variation}0${underbelly}FF${body}FF${flank}FF${markings}FF${maleDisplay}FF`;
                output.textContent = code;
            }

            update();
            
            onlyValidInput.addEventListener("change", fixColorInputs);
            dinoInput.addEventListener("change", update);
            patternInput.addEventListener("change", update);
            variationInput.addEventListener("change", update);
            maleDisplayInput.addEventListener("change", update);
            markingsInput.addEventListener("change", update);
            flankInput.addEventListener("change", update);
            bodyInput.addEventListener("change", update);
            underbellyInput.addEventListener("change", update);

            copyButton.addEventListener("click", function() {
                clearTimeout(copyTimeout);
                navigator.clipboard.writeText(code).then(() => {
                    if(Math.random() > 1.0) {
                        copyButton.style.setProperty('font-size', '7pt');
                        copyButton.innerText = "You didn't make something\nhideous, did you?";
                    } else {
                        copyButton.style.removeProperty('font-size');
                        copyButton.textContent = "Copied!";
                    }
                }).catch((err) => {
                    copyButton.textContent = "Error!";
                    console.error(err);
                }).finally(() => {
                    copyTimeout = setTimeout(() => {
                        copyButton.style.removeProperty('font-size');
                        copyButton.textContent = "Copy";
                    }, 2000);
                });
            });
        </script>
    </body>
</html>
