<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Isle Hordetest Skin Creator</title>
        <meta charset="utf8">
        <style>
            .color-input-container label {
                display: inline-block;
                width: 100px;
            }

            #output {
                margin-top: 20px;
                margin-right: 10px;
                width: 35em;
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <div class="color-input-container">
            <label for="male-display">Male Display</label>
            <input type="color" name="male-display" id="maleDisplay">
        </div>
        <div class="color-input-container">
            <label for="markings">Markings</label>
            <input type="color" name="markings" id="markings">
        </div>
        <div class="color-input-container">
            <label for="flank">Flank</label>
            <input type="color" name="flank" id="flank">
        </div>
        <div class="color-input-container">
            <label for="body">Body</label>
            <input type="color" name="body" id="body">
        </div>
        <div class="color-input-container">
            <label for="underbelly">Underbelly</label>
            <input type="color" name="underbelly" id="underbelly">
        </div>
        <input type="text" id="output" disabled></div><button id="copyButton">Copy</button>
        <script>
            const dinoInput = document.getElementById("dino");
            const maleDisplayInput = document.getElementById("maleDisplay");
            const markingsInput = document.getElementById("markings");
            const flankInput = document.getElementById("flank");
            const bodyInput = document.getElementById("body");
            const underbellyInput = document.getElementById("underbelly");
            const output = document.getElementById("output");
            const copyButton = document.getElementById("copyButton");

            const colorInputs = [maleDisplayInput, markingsInput, flankInput, bodyInput, underbellyInput];

            let code;
            let copyTimeout;

            function correctColor(hexColor) {
                let r = parseInt(hexColor.slice(1, 3), 16);
                let g = parseInt(hexColor.slice(3, 5), 16);
                let b = parseInt(hexColor.slice(5, 7), 16);

                if (r < 0x1A) {
                    const bump = 0x1A - r;
                    r += bump;
                    g += bump;
                    b += bump;
                }

                return "#" + r.toString(16).padStart(2, '0') + 
                             g.toString(16).padStart(2, '0') + 
                             b.toString(16).padStart(2, '0');
            }

            function update() {
                for(const colorInput of colorInputs) {
                    colorInput.value = correctColor(colorInput.value);
                }

                const maleDisplay = maleDisplayInput.value.slice(1).toUpperCase();
                const markings = markingsInput.value.slice(1).toUpperCase();
                const flank = flankInput.value.slice(1).toUpperCase();
                const body = bodyInput.value.slice(1).toUpperCase();
                const underbelly = underbellyInput.value.slice(1).toUpperCase();

                code = `000${underbelly}FF${body}FF${flank}FF${markings}FF${maleDisplay}FF`;
                output.value = code;
            }

            update();
            
            maleDisplayInput.addEventListener("change", update);
            markingsInput.addEventListener("change", update);
            flankInput.addEventListener("change", update);
            bodyInput.addEventListener("change", update);
            underbellyInput.addEventListener("change", update);
            copyButton.addEventListener("click", function() {
                clearTimeout(copyTimeout);
                navigator.clipboard.writeText(code).then(() => {
                    copyButton.textContent = "Copied!";
                }).catch((err) => {
                    copyButton.textContent = "Error!";
                    console.error(err);
                    alert(err);
                }).finally(() => {
                    copyTimeout = setTimeout(() => copyButton.textContent = "Copy", 2000);
                });
            });
        </script>
    </body>
</html>
